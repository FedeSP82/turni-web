<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendario Turni</title>

<style>
:root{
  --bg:#0f1115;
  --text:#eaeaea;
  --card:#0f131d;
  --border:#1f2638;
  --muted2:rgba(255,255,255,.55);
  --accent:rgba(106,166,255,.65);
}
*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  padding-bottom:78px;
}

header{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  background:rgba(15,17,21,.90);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
header h1{
  margin:0; font-size:15px; font-weight:950; flex:1; text-align:center;
}
header button{
  background:#131826; color:#fff; border:1px solid #2b3550; border-radius:12px;
  padding:10px 12px; cursor:pointer; font-weight:950; min-width:44px; min-height:44px;
}
header button:active{ transform:scale(.98); }

#calendarWrap{ padding:10px 10px 18px; max-width:980px; margin:0 auto; }

#dow{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px; }
.dowCell{
  text-align:center; font-size:10.5px; font-weight:950; letter-spacing:.35px;
  color: var(--muted2); padding:5px 2px; border-radius:12px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
}

#cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }

.cell{
  background:var(--card);
  border-radius:14px;
  padding:6px 7px;
  min-height:78px;
  cursor:pointer;
  border:1px solid var(--border);
  box-shadow: 0 8px 22px rgba(0,0,0,.14);
  min-width:0;
}
.cell.off{ opacity:.18; cursor:default }
.cell:hover{ border-color:#304060; }

.topRow{ display:flex; align-items:center; justify-content:space-between; gap:6px; }
.num{ font-size:11.5px; opacity:.78; font-weight:950; }
.savedDot{
 font-size:11px; opacity:.7; }

.turno{ font-size:17px; font-weight:1000; margin-top:5px; line-height:1.05; }
.orario{ font-size:12px; opacity:.72; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.turno.actual{ margin-top:6px; font-size:13px; font-weight:950; opacity:1; }
.iconsRow{ margin-top:6px; font-size:11px; opacity:.95; display:flex; gap:6px; flex-wrap:wrap; }


/* quando c'è effettivo: il previsto si rimpicciolisce e l'effettivo risalta */
.cell.hasEff .turno.planned{
  font-size:13px;
  opacity:.55;
  font-weight:900;
  margin-top:4px;
}
.cell.hasEff .turno.actual{
  font-size:18px;
  font-weight:1000;
  margin-top:6px;
}


.turno.M{color:#3ddc97}
.turno.P{color:#f7b731}
.turno.N{color:#4dabf7}
.turno.ON{color:#b37feb}
.turno.RC,.turno.RN{color:#9aa0a6}

.cell.today{
  border: 2px solid var(--accent);
  box-shadow: 0 0 0 2px rgba(106,166,255,.12) inset, 0 0 10px rgba(106,166,255,.22);
}

/* evidenzia rientri e forfettari su assenza */
.cell.hasRientro{ background: rgba(124,77,255,.10); }
.cell.hasAssForf{ background: rgba(255,159,26,.12); }
.hasRientro.hasAssForf{ background: rgba(255,159,26,.12); }
.cell.today .num{ color:#dbe7ff; }

@media (max-width: 390px){
  #cal, #dow{ gap:5px; }
  .cell{ min-height:74px; padding:6px; border-radius:13px; }
}

/* nav bassa */
.bottomNav{
  position:fixed; left:0; right:0; bottom:0;
  display:flex; gap:10px; padding:10px 12px;
  background:rgba(9,12,20,.92);
  border-top:1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(10px);
  z-index:50;
}
.bottomNav a{
  flex:1; background:#131826; color:#fff; border:1px solid #2b3550; border-radius:14px;
  padding:12px 10px; text-align:center; text-decoration:none; font-weight:950; font-size:12px;
}
.bottomNav a:active{ transform: scale(.99); }

/* ================= MODAL GIORNO ================= */

/* evidenziazione assenza */
.absActive{
  border:2px solid rgba(255, 107, 107, .55) !important;
  box-shadow: 0 0 0 2px rgba(255,107,107,.12) inset, 0 0 12px rgba(255,107,107,.18);
}
.absHint{
  margin-top:6px;
  font-size:12px;
  opacity:.8;
}

#dayModal{
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.62);
  z-index:20000;
  padding:10px;
  padding:10px;
}
#dayModal .box{
  width:min(520px, 100%);
  margin:0 auto;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background: #0f131d;
  box-shadow: 0 25px 80px rgba(0,0,0,.55);
  max-height: calc(100vh - 20px);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
#dayModal .head{
  justify-content:center;

  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
#dayModal .head h2{ margin:0; font-size:14px; font-weight:950; }
#dayModal .body{ padding:10px 12px; overflow:auto; }
#dayModal label{ display:block; font-size:11px; opacity:.75; margin:8px 0 4px; }
#dayModal input, #dayModal select, #dayModal textarea{
  width:100%;
  background: rgba(10,14,26,.75);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:10px 10px;
  font-size:16px; /* iPhone: evita zoom */
  outline:none;
}
#dayModal textarea{ min-height:90px; resize:vertical; }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:520px){ .grid2{ grid-template-columns:1fr; } }
#dayModal .foot{
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex; gap:10px;
  background: rgba(9,12,20,.70);
}
#dayModal button{
  flex:1;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:#131826;
  color:#fff;
  padding:12px 10px;
  font-weight:950;
  min-height:48px;
  cursor:pointer;
}
#dayModal #dmSave{ background: linear-gradient(180deg, #1d63ff 0%, #1547c8 100%); border-color: rgba(120,170,255,.55); }
#dmStatus{ margin-top:10px; font-size:12px; opacity:.75; }

/* Bottom navigation (sempre visibile) */
.bottomNav{
  position:fixed; left:0; right:0; bottom:0;
  display:flex; gap:10px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(9,12,20,.98);
  border-top:1px solid rgba(255,255,255,.10);
  backdrop-filter: blur(12px);
  z-index:9999; /* sopra tutto */
  box-shadow: 0 -10px 24px rgba(0,0,0,.35);
}
.bottomNav a{
  flex:1;
  background:#131826;
  color:#fff;
  border:1px solid #2b3550;
  border-radius:14px;
  padding:12px 10px;
  text-align:center;
  text-decoration:none;
  font-weight:950;
  min-height:44px;
  display:flex; align-items:center; justify-content:center;
}
.bottomNav a.active{
  background: linear-gradient(180deg, #1d63ff 0%, #1547c8 100%);
  border-color: rgba(120,170,255,.55);
}

body.modalOpen .bottomNav{ display:none !important; }

.legendColors{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;opacity:.85;font-size:12px}
.legendItem{display:flex;align-items:center;gap:6px}
.legendDot{width:10px;height:10px;border-radius:50%}
.legendDot.r{background:rgba(124,77,255,.35)}
.legendDot.a{background:rgba(255,159,26,.45)}


.clockDot{
  font-size: 12px;
  line-height: 1;
  opacity: .9;
}
.topRow{
  display:flex;
  justify-content: space-between;
  align-items: center;
}

</style>

  <script>
    // API su Cloudflare Worker (D1 bindato)
    window.API_BASE = "https://turni-api-v2.mecfed.workers.dev";
  </script>
</head>

<body>

<header>
  <button id="prev" aria-label="Mese precedente">◀</button>
  <h1 id="title">—</h1>
  <button id="next" aria-label="Mese successivo">▶</button>
</header>

<div id="calendarWrap">
  <div id="dow">
    <div class="dowCell">LUN</div><div class="dowCell">MAR</div><div class="dowCell">MER</div>
    <div class="dowCell">GIO</div><div class="dowCell">VEN</div><div class="dowCell">SAB</div><div class="dowCell">DOM</div>
  </div>
  <div id="cal">
  <div id="legendColors" class="legendColors">
    <div class="legendItem"><span class="legendDot r"></span>Rientro (FR66/FR32)</div>
    <div class="legendItem"><span class="legendDot a"></span>Forfettario su assenza</div>
  </div>
</div>
</div>

<div class="bottomNav">
  <a href="schemi.html" class="">Schemi</a>
  <a href="index.html" class="">Calendario</a>
  <a href="mese.html" class="">Mese</a>
  <a href="riepilogo.html" class="">Riepilogo</a>
  <a href="dati.html" class="">Dati</a>
</div>

<!-- MODAL GIORNO (richiesto da calendar_v0.js) -->
<div id="dayModal" aria-hidden="true">
  <div class="box" role="dialog" aria-modal="true">
    <div class="head">
      <h2 id="dmTitle">Giorno</h2>
</div>
    <div class="body">
      <label>Turno previsto</label>
      <input id="dmPlanned" disabled>

      <div class="grid2">
        <div>
          <label>Turno effettivo</label>
          <select id="dmActual">
            <option value="">(uguale al previsto)</option>
            <option>M</option><option>P</option><option>N</option><option>ON</option>
            <option>RC</option><option>RN</option>
            <option value="ASS">ASSENZA</option>
          </select>
          <label style="margin-top:8px;display:flex;gap:10px;align-items:center;font-size:12px;opacity:.9">
            <input id="dmAbsOn" type="checkbox" style="width:20px;height:20px;accent-color:#ff6b6b">
            Assenza
          </label>
        </div>

        <div id="dmAbsWrap" style="display:none">
          <label>Tipo assenza</label>
          <select id="dmAbsType">
            <option value="">—</option>
            <option>FERIE</option><option>PRF</option><option>RO</option><option>PT</option><option>104</option><option value="RF">RF</option>
          </select>
          <label style="margin-top:8px">Forfettario su assenza</label>
          <select id="dmAbsForf">
            <option value="">—</option>
            <option value="96">Forfettario 96€ (assenza)</option>
            <option value="66">Forfettario 66€ (assenza)</option>
          </select>

          <div id="dmAbsHint" class="absHint" style="display:none">⚠️ Assenza attiva</div>
          
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Trasferta</label>
          <select id="dmTripType">
            <option value="">—</option>
            <option value="96">96</option>
            <option value="66">66</option>
          </select>
        </div>

        <div id="dmTrip75Wrap" style="display:none">
          <label>Trasferta speciale (75%)</label>
          <select id="dmTrip75">
            <option value="">—</option>
            <option value="T72">72 € (75% di 96)</option>
            <option value="T49">49,50 € (75% di 66)</option>
          </select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Rientro (66/32)</label>
          <select id="dmForfettario">
            <option value="">—</option>
            <option value="FR66">Rientro (66€)</option>
            <option value="FR32">Rientro in giornata (32€)</option>
          </select>
        </div>

        <div>
          <label style="display:flex;gap:10px;align-items:center;font-size:12px;opacity:.9;margin-top:10px">
            <input id="dmLunch" type="checkbox" style="width:20px;height:20px;accent-color:#3ddc97">
            Pranzo (15,80€)
          </label>
        </div>


      <div class="grid2">
        <div>
          <label>Ora inizio (effettiva)</label>
          <input id="dmStart" type="time">
        </div>
        <div>
          <label>Ora fine (effettiva)</label>
          <input id="dmEnd" type="time">
        </div>
      </div>
      <div style="margin-top:6px;font-size:12px;opacity:.7">Se l’ora fine è prima dell’inizio, si intende uscita il giorno dopo.</div>

<div class="card" style="margin-top:10px">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
    <strong>Intervalli lavorati</strong>
    <button id="dmAddIv" class="btn" type="button" onclick="addInterval()">+ Intervallo</button>
  </div>
<div id="dmIvList" style="margin-top:10px;display:flex;flex-direction:column;gap:10px"></div>
</div>



      <div class="grid2">
        <div>
          <label>Ore viaggio 50%</label>
          <input id="dmTravel50" inputmode="decimal" placeholder="0,00">
        </div>
        <div>
          <label>Ore viaggio 100%</label>
          <input id="dmTravel100" inputmode="decimal" placeholder="0,00">
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Ore guida 150%</label>
          <input id="dmDrive150" inputmode="decimal" placeholder="0,00">
        </div>
        <div></div>
      </div>

      <div class="grid2">
        <div>
          <label>Benzina €</label>
          <input id="dmFuel" inputmode="decimal" placeholder="0,00">
        </div>
        <div>
          <label>Autostrada €</label>
          <input id="dmToll" inputmode="decimal" placeholder="0,00">
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Altre spese €</label>
          <input id="dmOther" inputmode="decimal" placeholder="0,00">
        </div>
        <div></div>
      </div>

      <textarea id="dmNote" placeholder="note..."></textarea>

      <div id="dmStatus"></div>
    </div>

    <div class="foot">
      <button id="dmSave" type="button">Salva</button>
      <button id="dmClose2" type="button">Chiudi</button>
    </div>
  </div>
</div>


      

<script>
  // Chiudi modal (pulsante "Chiudi" in fondo)
  document.addEventListener("click", (e)=>{
    if(e.target && e.target.id === "dmClose2"){
      const m = document.getElementById("dayModal");
      if(m) m.style.display = "none";
    }
  });

  // Versione app
  window.__APP_VERSION = "v168 (ore viaggio nel giorno calendario)";
  console.log("APP_VERSION", window.__APP_VERSION);
</script>

<script src="calendar_v0.js"></script>
</body>
</html>
